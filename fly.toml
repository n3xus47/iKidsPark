# fly.toml app configuration file generated for iKids Park
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Region: fra (Frankfurt) — blisko Supabase eu-central-1.
# Warszawa (waw) jest wycofana na Fly; arn (Sztokholm) też OK, ale fra jest bliżej bazy.

app = 'ikidspark'
primary_region = 'fra'

[build]

[env]
  IKIDS_HTTP = '1'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
