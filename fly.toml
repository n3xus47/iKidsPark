# fly.toml app configuration file generated for iKids Park
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'ikidspark'
primary_region = 'arn'

[build]

[env]
  IKIDS_HTTP = '1'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
